apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "scaleway-sfs-subdir-csi.fullname" . }}-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "scaleway-sfs-subdir-csi.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  strategy:
    type: Recreate
  progressDeadlineSeconds: {{ .Values.controller.progressDeadlineSeconds }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "scaleway-sfs-subdir-csi.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        {{- include "scaleway-sfs-subdir-csi.labels" . | nindent 8 }}
        app.kubernetes.io/component: controller
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        scaleway-sfs-subdir-csi.io/node-config-generation: {{ include "scaleway-sfs-subdir-csi.nodeConfigGeneration" . | quote }}
        scaleway-sfs-subdir-csi.io/driver-image-tag: {{ .Values.image.tag | quote }}
        scaleway-sfs-subdir-csi.io/provisioner-image-tag: {{ .Values.sidecars.externalProvisioner.tag | quote }}
        scaleway-sfs-subdir-csi.io/attacher-image-tag: {{ .Values.sidecars.externalAttacher.tag | quote }}
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "scaleway-sfs-subdir-csi.controllerServiceAccount" . }}
      automountServiceAccountToken: true
      priorityClassName: {{ .Values.priorityClassName }}
      terminationGracePeriodSeconds: {{ .Values.controller.terminationGracePeriodSeconds }}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      nodeSelector:
        {{- toYaml .Values.controller.nodeSelector | nindent 8 }}
      {{- with .Values.controller.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: driver
          image: {{ include "scaleway-sfs-subdir-csi.driverImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.integrationTest.fakeDriver.enabled }}
          command: [{{ .Values.integrationTest.fakeDriver.binaryPath | quote }}]
          args:
            - --mode=controller
            - --endpoint=unix:///csi/csi.sock
            - --driver-name={{ .Values.driver.name }}
            - --node-name=$(NODE_NAME)
            - --data-root={{ .Values.controller.parentMountRoot }}/.kind-fake-data
            - --kubelet-path={{ .Values.node.kubeletPath }}
            - --live-address=:9810
          {{- else }}
          args:
            - --mode=controller
            - --endpoint=unix:///csi/csi.sock
            - --admin-endpoint=unix:///run/scaleway-sfs-subdir-csi/admin.sock
            - --config=/etc/scaleway-sfs-subdir-csi/config.json
            - --live-address=:9810
            {{- if .Values.metrics.enabled }}
            - --metrics-address=:{{ .Values.metrics.port }}
            {{- end }}
          {{- end }}
          env:
            - name: POD_NAME
              valueFrom: {fieldRef: {fieldPath: metadata.name}}
            - name: POD_UID
              valueFrom: {fieldRef: {fieldPath: metadata.uid}}
            - name: NODE_NAME
              valueFrom: {fieldRef: {fieldPath: spec.nodeName}}
            - name: INSTALLATION_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.installation.existingSecretName }}
                  key: {{ .Values.installation.idKey }}
            - name: SCW_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.scaleway.credentials.existingSecretName }}
                  key: {{ .Values.scaleway.credentials.accessKeyKey }}
            - name: SCW_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.scaleway.credentials.existingSecretName }}
                  key: {{ .Values.scaleway.credentials.secretKeyKey }}
            - name: SCW_DEFAULT_PROJECT_ID
              value: {{ .Values.scaleway.projectId | quote }}
            - name: SCW_DEFAULT_REGION
              value: {{ .Values.scaleway.region | quote }}
            - name: SCW_DEFAULT_ZONE
              value: {{ .Values.scaleway.defaultZone | quote }}
          ports:
            - {name: livez, containerPort: 9810, protocol: TCP}
            - {name: csi-health, containerPort: 9808, protocol: TCP}
            {{- if .Values.metrics.enabled }}
            - {name: metrics, containerPort: {{ .Values.metrics.port }}, protocol: TCP}
            {{- end }}
          startupProbe:
            httpGet: {path: /healthz, port: csi-health}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          readinessProbe:
            httpGet: {path: /healthz, port: csi-health}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          livenessProbe:
            httpGet: {path: /livez, port: livez}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          securityContext:
            privileged: true
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: true
            readOnlyRootFilesystem: true
            seccompProfile: {type: Unconfined}
          resources:
            {{- toYaml .Values.resources.controllerDriver | nindent 12 }}
          volumeMounts:
            - {name: csi-socket, mountPath: /csi}
            - {name: config, mountPath: /etc/scaleway-sfs-subdir-csi, readOnly: true}
            - {name: controller-parents, mountPath: {{ .Values.controller.parentMountRoot }}}
            - {name: run, mountPath: /run}
            - {name: tmp, mountPath: /tmp}
            # Private, non-propagated quarantine for FD-anchored unmount.
            - {name: mount-quarantine, mountPath: /run/scaleway-sfs-subdir-csi-mount-quarantine}
        - name: external-provisioner
          image: {{ include "scaleway-sfs-subdir-csi.sidecarImage" .Values.sidecars.externalProvisioner }}
          args:
            - --csi-address=/csi/csi.sock
            - --timeout={{ .Values.sidecars.operationTimeout }}
            - --worker-threads={{ .Values.sidecars.externalProvisioner.workerThreads }}
            - --extra-create-metadata=true
            - --leader-election={{ .Values.controller.leaderElection }}
            - --leader-election-namespace={{ .Release.Namespace }}
          env:
            - name: POD_NAMESPACE
              valueFrom: {fieldRef: {fieldPath: metadata.namespace}}
          securityContext: &sidecarSecurityContext
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: ["ALL"]}
          resources:
            {{- toYaml .Values.resources.externalProvisioner | nindent 12 }}
          volumeMounts:
            - {name: csi-socket, mountPath: /csi}
            - {name: tmp, mountPath: /tmp}
        - name: external-attacher
          image: {{ include "scaleway-sfs-subdir-csi.sidecarImage" .Values.sidecars.externalAttacher }}
          args:
            - --csi-address=/csi/csi.sock
            - --timeout={{ .Values.sidecars.operationTimeout }}
            - --worker-threads={{ .Values.sidecars.externalAttacher.workerThreads }}
            - --leader-election={{ .Values.controller.leaderElection }}
            - --leader-election-namespace={{ .Release.Namespace }}
          env:
            - name: POD_NAMESPACE
              valueFrom: {fieldRef: {fieldPath: metadata.namespace}}
          securityContext: *sidecarSecurityContext
          resources:
            {{- toYaml .Values.resources.externalAttacher | nindent 12 }}
          volumeMounts:
            - {name: csi-socket, mountPath: /csi}
            - {name: tmp, mountPath: /tmp}
        - name: liveness-probe
          image: {{ include "scaleway-sfs-subdir-csi.sidecarImage" .Values.sidecars.livenessProbe }}
          args:
            - --csi-address=/csi/csi.sock
            - --health-port=9808
          securityContext: *sidecarSecurityContext
          resources:
            {{- toYaml .Values.resources.livenessProbe | nindent 12 }}
          volumeMounts:
            - {name: csi-socket, mountPath: /csi}
            - {name: tmp, mountPath: /tmp}
      volumes:
        - name: csi-socket
          emptyDir: {}
        - name: config
          configMap:
            name: {{ include "scaleway-sfs-subdir-csi.fullname" . }}-config
        - name: controller-parents
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: run
          emptyDir: {}
        - name: mount-quarantine
          emptyDir: {}
